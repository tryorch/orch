version: orch/1.0

metadata:
  id: docker-compose-smoke
  description: Local Docker Compose smoke test
  owner:
    name: Orch
    email: orch@example.com

state:
  backend: local
  config:
    path: .orch

runners:
  local:
    type: local
    config: {}

components:
  web:
    type: docker-compose
    runner: local
    workdir: ./tests/docker-compose-smoke/.workdir
    source:
      files:
        docker-compose.yml: ./tests/docker-compose-smoke/docker-compose.yml
    config:
      command: docker compose
