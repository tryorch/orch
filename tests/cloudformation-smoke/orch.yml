version: orch/1.0

metadata:
  id: cloudformation-smoke
  description: Local CloudFormation smoke test
  owner:
    name: Orch
    email: orch@example.com

state:
  backend: local
  config:
    path: .orch

runners:
  local:
    type: local
    config: {}

components:
  cf:
    type: cloudformation
    runner: local
    workdir: ./tests/cloudformation-smoke/.workdir
    source:
      files:
        template.yml: ./tests/cloudformation-smoke/template.yml
    config:
      tags:
        OrchSmoke: cloudformation
